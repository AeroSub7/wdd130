<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Practice</title>
</head>

<body>
    <header></header>
    <main>
        <h1>WDD 130 | HTML Form - User Poll</h1>
        <>
            <h2>Contact information</h2>
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" required>
            <label for="useremail">Email:</label>
            <input type="text" id="useremail" name="useremail" required>
            <h2>Questions</h2>
            <label for="browser">What is your favorite browser?</label>
            <select name="browser" id="browser">
                <option value="chrome">chrome</option>
                <option value="firefox">Firefox</option>
                <option value="opera">Opera</option>
                <option value="edge">Edge</option>
                <option value="safari">Safari</option>
                <option value="brave">Brave</option>
                <option value="other">Other</option>
            </select>
            <label><input type="checkbox" id="pet" name="pet">Do you have a household pet?</label>
            <label for="feedback">List the places you have lived.</label>
            <textarea name="feedback" id="feedback" rows="5"></textarea>
            <button type="submit">Subit Poll</button>
            </form>
    </main>
    <footer>
        <p>©2026 🏭 Eric Johnson 🏭 Idaho, USA</p>
    </footer>
</body>

</html>
