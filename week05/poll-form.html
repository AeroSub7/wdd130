<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Practice</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>
        <h1>WDD 130 | HTML Form - User Poll</h1>
    </header>
    <main>
        <form>
            <fieldset>
                <legend>Contact information</legend>
                <div class="form-item column2"><label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>
                <div class="form-item column2"><label for="useremail">Email:</label>
                    <input type="text" id="useremail" name="useremail" required>
                </div>
            </fieldset>
            <fieldset>
                <legend>Questions</legend>
                <div class="form-item column1"><label for="browser">What is your favorite
                        browser?</label>
                    <select name="browser" id="browser">
                        <option value="chrome">chrome</option>
                        <option value="firefox">Firefox</option>
                        <option value="opera">Opera</option>
                        <option value="edge">Edge</option>
                        <option value="safari">Safari</option>
                        <option value="brave">Brave</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-item column1">
                    <label>Do you have a household
                        pet?<input type="checkbox" id="pet" name="pet"></label>
                </div>
                <div class="form-item">
                    <label for="feedback">List the places you have lived.</label>
                    <textarea name="feedback" id="feedback" rows="5"></textarea>
                </div><button type="submit">Subit Poll</button>
            </fieldset>
        </form>
    </main>
    <footer>
        <p>©2026 🏭 Eric Johnson 🏭 Idaho, USA</p>
    </footer>
</body>

</html>
