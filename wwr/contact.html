<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satisfactory White Water Rafting Contact Us</title>
    <meta name="description" content="Satisfactory White Water Rafting Contact Us page">
    <meta name="author" content="Eric Johnson">
    <link rel="stylesheet" href="styles/rafting.css">
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"> -->
</head>

<body>
    <header>
        <img src="images/rafting-logo.png" alt="Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>

        <section class="start">
            <h1 class="contact-us">Satisfactory White Water Rafting</h1>
            <p>MASSAGE-2(A-B)b Planet</p>
            <p>Akkis Star System</p>
            <p>(888)246-4679</p>
            <p>bobby128094@ficsit.com</p>
        </section>
        <section class="middle">
            <div class="map"><iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d2692.7666112333977!2d166.66016112758965!3d-77.84562109449948!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1775618719424!5m2!1sen!2sus"
                  allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <form>
                <div class="form-item"><label for="name">Name</label>
                    <input type="text" id="name" name="name">
                </div>
                <div class="form-item">
                    <label for="email">Email</label><input type="text" id="email" name="email">
                </div>
                <fieldset>
                    <p>Message Purpose</p>
                    <div class="form-item">
                        <input type="radio" name="general-inquiry" id="general-inquiry"><label
                          for="general-inquiry">General Inquiry</label>
                    </div>
                    <div class="form-item">
                        <input type="radio" name="reservation-question"
                          id="reservation-question"><label for="reservation-question">Reservation
                            Question</label>
                    </div>
                    <div class="form-item">
                        <input type="radio" name="website-suggestion" id="website-suggestion"><label
                          for="website-suggestion">Website Suggestion</label>
                    </div>
                </fieldset>
                <div class="form-item">
                    <label for="message">Message</label><textarea name="message" id="message"
                      rows="4"></textarea>
                </div>
                <div class="form-item last-item">
                    <input type="checkbox" name="subscribe" id="subscribe"
                      class="size-normal"><label for="subscribe">Please
                        subscribe me to the monthly newsletter</label>
                </div>
                <button type="submit">Get in Touch!</button>
            </form>
        </section>
        <section class="grid end">
            <h2>We Are Here to Serve You</h2>
            <figure class="profile"><img src="images/boss-bobby.jpg" alt="Boss Bobby">
                <figcaption>Boss Bobby</figcaption>
            </figure>
            <figure class="profile"><img src="images/guide-stephanie.jpg" alt="Guide Stephanie">
                <figcaption>Guide Stephanie</figcaption>
            </figure>
            <figure class="profile"><img src="images/guide-scarlett.jpg" alt="Guide Scarlett">
                <figcaption>Guide Scarlett</figcaption>
            </figure>
        </section>

    </main>
    <footer class="grid2">
        <p>©2026 🏭 Satisfactory White Water Rafting 🏭 Eric Johnson</p>
        <nav class="socialmedia">
            <a href="https://x.com"><img src="images/logo-x.png" alt="X Logo"></a>
            <a href="https://facebook.com"><img src="images/facebook_logo.png"
                  alt="Facebook Logo"></a>
            <a href="https://instagram.com"><img src="images/instagram-logo.jpg"
                  alt="Instagram Logo"></a>
        </nav>
    </footer>
</body>

</html>
